<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Altiteb</title>
  <!-- Google font -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-..." crossorigin="anonymous">
  <style>
    body {
      background: linear-gradient(135deg, #f5f7ff 0%, #f0f4ff 100%);
      font-family: 'Roboto', sans-serif;
    }
    .navbar {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
    }
    .navbar-brand {
      font-weight: 900;
      letter-spacing: 2px;
      font-size: 1.5rem;
      color: white !important;
    }
    .card {
      margin-bottom: 1rem;
      border: none;
      border-radius: .75rem;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.1);
      transition: transform 0.3s, box-shadow 0.3s;
      border-left: 4px solid #667eea;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.2);
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, #764ba2 0%, #f093fb 100%);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    }
    .nota-geral { 
      font-size: 1.6rem; 
      font-weight: 700; 
      color: #667eea;
    }
    .platform-card {
      border: 2px solid #e0e7ff;
      border-radius: .5rem;
      padding: 1rem;
      background: linear-gradient(135deg, #ffffff 0%, #f8faff 100%);
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.08);
    }
    .badge-vantagem { 
      font-size: 0.9rem;
      white-space: nowrap; /* prevent text wrapping/truncation */
      padding: 0.4em 0.6em;
    }

    /* flags de preço */
    .badge-price-purple {
      background: linear-gradient(135deg, #7b2cff 0%, #a64bf5 100%) !important;
      color: #fff !important;
      box-shadow: 0 4px 12px rgba(122, 38, 255, 0.15);
    }

    .badge-price-equal {
      background: linear-gradient(135deg, #f3e8ff 0%, #efe6ff 100%) !important;
      color: #5b2b90 !important;
      border: 1px solid rgba(91,43,144,0.08);
    }

    .badge-success {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
    }
    .hero-title {
      text-align: center;
      font-size: 2.2rem;
      margin-bottom: 2rem;
      font-weight: 900;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .form-select, .form-control {
      border: 2px solid #e0e7ff;
      border-radius: .5rem;
      transition: all 0.3s;
    }
    .form-select:focus, .form-control:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
    }
    .cursor-pointer {
      cursor: pointer;
    }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">🛒 Altiteb</a>
  </div>
</nav>
<div class="container">
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-..." crossorigin="anonymous"></script>
</body>
</html>
