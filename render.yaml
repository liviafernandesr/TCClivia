services:
  - type: web
    name: altiteb
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app_flask:app --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 180
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: HF_SUMMARY_MODEL
        value: csebuetnlp/mT5_multilingual_XLSum
      - key: HF_SUMMARY_FALLBACK_MODELS
        value: csebuetnlp/mT5_multilingual_XLSum,facebook/bart-large-cnn
      - key: HF_INFERENCE_TIMEOUT
        value: "45"
      - key: ALLOW_LOCAL_LLM_FALLBACK
        value: "0"
